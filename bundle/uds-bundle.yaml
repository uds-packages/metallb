kind: UDSBundle
metadata:
  name: metallb-test
  description: A UDS Bundle for MetalLB
  version: dev

packages:
  - name: init
    repository: ghcr.io/zarf-dev/packages/init
    ref: v0.81.1
    keylessVerification:
      certificateIdentityRegexp: https://github.com/zarf-dev/zarf/.github/workflows/release.yml@refs/tags/v\d+\.\d+.\d+
      certificateOIDCIssuer: https://token.actions.githubusercontent.com

  - name: core-crds
    repository: ghcr.io/defenseunicorns/packages/uds/core-crds
    ref: 1.8.0-upstream

  - name: metallb
    path: ../
    ref: dev

  - name: core-base
    repository: ghcr.io/defenseunicorns/packages/uds/core-base
    ref: 1.8.0-upstream
    optionalComponents:
      - istio-passthrough-gateway
