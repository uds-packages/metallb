{{- if .Values.tenantIngress.ipAddressPool }}
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: tenant-ingressgateway
  namespace: metallb-system
spec:
  addresses:
    - {{ .Values.tenantIngress.ipAddressPool }}/32
  {{- if or .Values.tenantIngress.namespace .Values.tenantIngress.matchLabels }}
  serviceAllocation:
    priority: 50
    {{- if .Values.tenantIngress.namespace }}
    namespaces:
      - {{ .Values.tenantIngress.namespace }}
    {{- end }}
    {{- if .Values.tenantIngress.matchLabels }}
    serviceSelectors:
      - matchLabels:
          {{- toYaml .Values.tenantIngress.matchLabels | nindent 10 }}
    {{- end }}
  {{- end }}
{{- end }}
