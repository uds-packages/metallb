{{- $fqdn := printf "%s.uds.dev" .Values.host }}
{{- $cert := genSelfSignedCert $fqdn nil (list $fqdn) 3650 }}
apiVersion: v1
kind: Secret
metadata:
  name: passthrough-test-tls
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
